<!DOCTYPE html>
<html>
<head>
<title>เพิ่มพนักงาน</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>เพิ่มพนักงาน</h2>

<form action="/save_employee" method="post">

<input type="text" name="emp_id" placeholder="รหัสพนักงาน" required>

<input type="text" name="name" placeholder="ชื่อพนักงาน" required>

<select name="department">
<option value="IT">IT</option>
<option value="HR">HR</option>
<option value="บัญชี">บัญชี</option>
<option value="การตลาด">การตลาด</option>
</select>

<select name="position">
<option value="พนักงาน">พนักงาน</option>
<option value="หัวหน้า">หัวหน้า</option>
<option value="ผู้จัดการ">ผู้จัดการ</option>
</select>

<br><br>

<button class="btn-green">บันทึก</button>

</form>

<br>

<a class="back-btn" href="/">กลับหน้าแรก</a>

</div>

</body>
</html>
