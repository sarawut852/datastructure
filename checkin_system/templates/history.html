<!DOCTYPE html>
<html>
<head>
<title>ประวัติการลงเวลา</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>ประวัติการลงเวลา</h2>

<table>

<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>เวลา</th>
<th>สถานะ</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a class="delete-btn"
href="/delete_all_history"
onclick="return confirm('ต้องการลบประวัติทั้งหมดหรือไม่?')">
ลบประวัติทั้งหมด
</a>

<br><br>

<a class="back-btn" href="/">กลับหน้าแรก</a>

</body>
</html>
